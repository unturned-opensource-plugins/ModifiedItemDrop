name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 匹配所有以v开头的版本tag，例如 v1.0.0, v1.1.0
  workflow_dispatch:  # 允许手动触发
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write  # 需要写入权限来创建 release
    
    steps:
    - name: Extract version from tag
      id: get_version
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $tag = "${{ github.event.inputs.tag }}"
        } else {
          $tag = "${{ github.ref_name }}"
        }
        $version = $tag -replace '^v', ''
        echo "TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        echo "Tag: $tag, Version: $version"
        
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || steps.get_version.outputs.TAG }}
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build -c Release --no-restore
        
    - name: Prepare release files
      run: |
        New-Item -ItemType Directory -Force -Path "release" | Out-Null
        Copy-Item "bin\Release\net48\ModifiedItemDrop.dll" -Destination "release\" -Force
        Copy-Item "ModifiedItemDrop.configuration.xml" -Destination "release\" -Force
        
    - name: Create release archive
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        Compress-Archive -Path "release\*" -DestinationPath "ModifiedItemDrop-$version.zip" -Force
        
    - name: Generate release notes
      id: release_notes
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        $date = Get-Date -Format "yyyy-MM-dd"
        $notes = "# ModifiedItemDrop v$version Release Notes`n`n"
        $notes += "## 版本信息`n"
        $notes += "- **版本**: $version`n"
        $notes += "- **发布日期**: $date`n`n"
        $notes += "## 功能特性`n`n"
        $notes += "### 核心功能`n"
        $notes += "- **分区概率控制**：支持为主武器、副武器、手持槽分别设置掉落概率`n"
        $notes += "- **衣物/容器规则**：支持上衣、裤子、背包、背心、帽子、面罩、眼镜等槽位的自定义掉落规则`n"
        $notes += "  - SlotDropChance: 控制衣物本体掉落概率`n"
        $notes += "  - ContentsDropChance: 控制衣物内容物掉落概率`n"
        $notes += "- **自定义物品概率**：可为指定 ItemID 设置优先级最高的掉落概率`n"
        $notes += "- **热重载**：支持 `/mid reload` 命令在不重启服务器的情况下重新加载配置`n"
        $notes += "- **自动热重载**：配置文件修改后自动检测并重新加载`n`n"
        $notes += "### 调试工具`n"
        $notes += "- **调试日志**：`EnableDebugLogging` 可输出详细的概率计算过程`n"
        $notes += "- **衣物内容调试**：`EnableClothingContentsDebugLogging` 可单独观察衣物内部物品的判定`n"
        $notes += "- **运行期调试**：`n"
        $notes += "  - `/mid preview [player]`: 查看玩家当前装备概率`n"
        $notes += "  - `/mid dump [player]`: 导出玩家完整库存信息`n"
        $notes += "  - `/mid claim`: 领取待发放物品`n`n"
        $notes += "### 修复与安全性`n"
        $notes += "- 修复 Claim 衣物重复领取/残留问题`n"
        $notes += "- 修复衣物内容物在断线/持久化时可能重复保存的问题`n"
        $notes += "- 修复 Claim 关闭或不可用时可能吞物品的问题，改为掉落到地面`n"
        $notes += "- 修复玩家死亡时可能误处理外部存储页的问题`n"
        $notes += "- 修复 Claim 删除未强制落盘导致崩服后可能重复领取的问题`n`n"
        $notes += "## 安装说明`n`n"
        $notes += "1. 将 `ModifiedItemDrop.dll` 复制到服务器的 `Rocket/Plugins/` 目录`n"
        $notes += "2. 将 `ModifiedItemDrop.configuration.xml` 复制到 `Rocket/Plugins/ModifiedItemDrop/` 目录`n"
        $notes += "3. 启动服务器或在游戏内执行 `/mid reload`n`n"
        $notes += "## 配置文件`n`n"
        $notes += "配置文件路径: `Rocket/Plugins/ModifiedItemDrop/ModifiedItemDrop.configuration.xml`n`n"
        $notes += "所有概率值应在 [0,1] 区间内。详细配置说明请参考 README.md。`n`n"
        $notes += "## 命令与权限`n`n"
        $notes += "- `/mid reload` - 热重载配置（权限: `modifieditemdrop.reload`）`n"
        $notes += "- `/mid preview [player]` - 查看掉落概率（权限: `modifieditemdrop.preview`）`n"
        $notes += "- `/mid dump [player]` - 导出库存信息（权限: `modifieditemdrop.preview`）`n"
        $notes += "- `/mid claim` - 领取待发放物品（权限: `modifieditemdrop.claim`）`n`n"
        $notes += "## 依赖要求`n`n"
        $notes += "- Unturned Dedicated Server`n"
        $notes += "- RocketMod`n"
        $notes += "- .NET Framework 4.8`n`n"
        $notes += "## 作者`n`n"
        $notes += "FF, Emqo`n`n"
        $notes += "## 许可证`n`n"
        $notes += "MIT`n"
        $notes | Out-File -FilePath "RELEASE_NOTES.md" -Encoding utf8 -NoNewline
        echo "NOTES_PATH=RELEASE_NOTES.md" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.TAG }}
        files: ModifiedItemDrop-${{ steps.get_version.outputs.VERSION }}.zip
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

