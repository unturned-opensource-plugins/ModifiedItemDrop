name: Build and Release

on:
  push:
    tags:
      - 'v2.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'v2 tag to build (e.g., v2.0.0)'
        required: true
        default: 'v2.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Extract version from tag
      id: get_version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $tag = "${{ github.event.inputs.tag }}"
        } else {
          $tag = "${{ github.ref_name }}"
        }
        if ($tag -notmatch '^v2\.\d+\.\d+$') {
          throw "ModifiedItemDrop v2 release workflow only accepts v2.x.y tags. Received: $tag"
        }
        $version = $tag -replace '^v', ''
        echo "TAG=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        echo "Tag: $tag, Version: $version"

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || steps.get_version.outputs.TAG }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Verify release metadata
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        [xml]$project = Get-Content "ModifiedItemDrop.csproj"
        $projectVersion = $project.Project.PropertyGroup.Version
        $license = $project.Project.PropertyGroup.PackageLicenseExpression
        if ($projectVersion -ne $version) {
          throw "Project version $projectVersion does not match release tag version $version."
        }
        if ($license -ne "MIT") {
          throw "PackageLicenseExpression must be MIT. Found: $license"
        }
        if (-not (Select-String -Path "LICENSE" -Pattern "MIT License" -Quiet)) {
          throw "LICENSE must contain MIT License."
        }
        if (-not (Select-String -Path "README.md" -Pattern "MIT License" -Quiet)) {
          throw "README must document MIT License."
        }
        $notesPath = "docs/release/v$version.md"
        if (-not (Test-Path $notesPath)) {
          throw "Release notes are required at $notesPath."
        }

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Prepare release files
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "release" | Out-Null
        Copy-Item "bin\Release\net48\ModifiedItemDrop.dll" -Destination "release\" -Force
        Copy-Item "bin\Release\net48\ModifiedItemDrop.Domain.dll" -Destination "release\" -Force
        Copy-Item "ModifiedItemDrop.configuration.xml" -Destination "release\" -Force
        Copy-Item "README.md" -Destination "release\" -Force
        Copy-Item "LICENSE" -Destination "release\" -Force

    - name: Create release archive
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.VERSION }}"
        Compress-Archive -Path "release\*" -DestinationPath "ModifiedItemDrop-$version.zip" -Force

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.TAG }}
        files: ModifiedItemDrop-${{ steps.get_version.outputs.VERSION }}.zip
        body_path: docs/release/${{ steps.get_version.outputs.TAG }}.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
